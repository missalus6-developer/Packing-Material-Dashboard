<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>PM Inventory | Complete System</title>
  <style>
    :root {
      --bg: #0f1117; --bg2: #1a1d27; --bg3: #22263a; --card: #1e2235;
      --border: #2e334d; --text: #e8eaf6; --muted: #8b91b5; --accent: #4f78ff;
      --green: #22c55e; --red: #ef4444; --amber: #f59e0b; --blue: #38bdf8; --purple: #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh;
    }
    
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f1117 0%, #1a1d27 50%, #0f1117 100%);
    }
    .login-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      padding: 40px; width: 440px; max-width: 96vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-box .logo { text-align: center; margin-bottom: 8px; font-size: 36px; }
    .login-box h1 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .login-box .subtitle { color: var(--muted); font-size: 13px; text-align: center; margin-bottom: 28px; }
    .login-box label { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 1px; }
    .login-box input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 14px;
      margin-bottom: 18px; outline: none; transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,120,255,0.1); }
    .login-box input::placeholder { color: #555; }
    .login-btn {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 8px; transition: all 0.2s; letter-spacing: 0.5px;
    }
    .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error { color: var(--red); font-size: 12px; text-align: center; margin-top: 12px; display: none; padding: 10px; background: #450a0a; border-radius: 8px; }
    .password-field { position: relative; }
    .toggle-password {
      position: absolute; right: 14px; top: 42px; background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px;
    }
    .toggle-password:hover { color: var(--text); }
    
    #app { display: none; }
    .topbar {
      background: var(--bg2); border-bottom: 1px solid var(--border); display: flex;
      align-items: center; justify-content: space-between; padding: 0 20px; height: 52px;
      position: sticky; top: 0; z-index: 100;
    }
    .brand { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .brand em { color: var(--accent); font-style: normal; }
    .tr { display: flex; align-items: center; gap: 10px; }
    .uchip {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 20px;
      padding: 4px 12px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px;
    }
    .rbadge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .rbadge.pm { background: #1e3a5f; color: var(--blue); }
    .rbadge.su { background: #14532d; color: var(--green); }
    .rbadge.ad { background: #3b1f6a; color: var(--purple); }
    .bsm {
      background: var(--bg3); border: 1px solid var(--border); color: var(--muted);
      border-radius: 7px; padding: 5px 11px; cursor: pointer; font-size: 12px;
    }
    .bsm:hover { border-color: var(--accent); color: var(--text); }
    .logout-btn { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .logout-btn:hover { background: #7f1d1d; color: #fff; border-color: #ef4444; }
    .nav {
      background: var(--bg2); border-bottom: 1px solid var(--border); display: flex;
      padding: 0 20px; gap: 2px; overflow-x: auto;
    }
    .tab {
      padding: 11px 16px; cursor: pointer; font-size: 13px; color: var(--muted);
      border-bottom: 2px solid transparent; white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.on { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .tab.hide { display: none; }
    .pg { padding: 20px; max-width: 1600px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 20px; }
    .sc {
      background: var(--card); border: 1px solid var(--border); border-radius: 11px;
      padding: 18px; display: flex; align-items: center; gap: 14px;
    }
    .sico { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .sico.b { background: #1e3a5f; } .sico.g { background: #14532d; } .sico.r { background: #450a0a; } .sico.a { background: #422006; }
    .sv { font-size: 28px; font-weight: 700; line-height: 1; }
    .sl { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .tbox { background: var(--card); border: 1px solid var(--border); border-radius: 11px; overflow: hidden; }
    .th2 { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
    .tt { font-size: 14px; font-weight: 600; }
    .ts2 { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 6px 12px; color: var(--text); font-size: 12px; width: 210px; outline: none; }
    .ts2:focus { border-color: var(--accent); }
    .tsc { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 1100px; }
    th { background: var(--bg3); text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 11px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(79,120,255,.04); }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .pg2 { color: #4ade80; background: #14532d; } .pr2 { color: #f87171; background: #450a0a; }
    .pa2 { color: #fbbf24; background: #422006; } .pb2 { color: #60a5fa; background: #1e3a5f; }
    .pz2 { color: var(--muted); background: var(--bg3); border: 1px solid var(--border); }
    .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .dg { background: #4ade80; } .dr { background: #f87171; }
    select.ps { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 3px 6px; color: var(--text); font-size: 11px; cursor: pointer; outline: none; width: 100%; min-width: 130px; }
    select.ps.av { border-color: var(--green); color: var(--green); }
    select.ps.na { border-color: var(--red); color: var(--red); }
    select.ps.nr { border-color: #c084fc; color: #c084fc; }
    input.pq { width: 58px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 3px 6px; color: var(--text); font-size: 11px; text-align: center; outline: none; }
    .pm-cell { display: flex; flex-direction: column; gap: 4px; min-width: 130px; }
    .pm-lbl { font-size: 9px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
    .bsave { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 11px; cursor: pointer; font-weight: 600; white-space: nowrap; }
    .bsave:hover { opacity: .85; } .bsave:disabled { opacity: .4; cursor: default; }
    .border-btn { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; border-radius: 6px; padding: 5px 11px; font-size: 11px; cursor: pointer; font-weight: 600; white-space: nowrap; }
    .border-btn:hover { background: #7f1d1d; color: #fff; }
    .complete-btn { background: #14532d; color: #4ade80; border: 1px solid #22c55e; border-radius: 6px; padding: 5px 11px; font-size: 11px; cursor: default; font-weight: 600; }
    .modify-btn { background: #422006; color: #fbbf24; border: 1px solid #f59e0b; border-radius: 6px; padding: 5px 11px; font-size: 11px; cursor: pointer; font-weight: 600; }
    .modify-btn:hover { background: #78350f; color: #fff; }
    .action-cell { display: flex; gap: 4px; flex-wrap: wrap; }
    .err-banner { background: #450a0a; border: 1px solid #7f1d1d; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 12px; color: #f87171; line-height: 1.6; }
    .filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 7px 16px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all .15s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { color: #fff; border-color: transparent; }
    .filter-btn.all.active { background: var(--accent); }
    .filter-btn.tab.active { background: #1e3a5f; color: var(--blue); border-color: var(--blue); }
    .filter-btn.cap.active { background: #14532d; color: var(--green); border-color: var(--green); }
    .filter-btn.onc.active { background: #422006; color: var(--amber); border-color: var(--amber); }
    .filter-count { font-size: 10px; background: rgba(255,255,255,.1); padding: 1px 6px; border-radius: 10px; margin-left: 4px; }
    
    .mbk { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 999; align-items: center; justify-content: center; }
    .mbk.on { display: flex; }
    .mbox { background: var(--card); border: 1px solid var(--border); border-radius: 14px; width: 600px; max-width: 96vw; max-height: 85vh; overflow-y: auto; padding: 28px; }
    .mbox h2 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .msub { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
    .order-item-row { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; }
    .order-item-name { flex: 1; font-weight: 600; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .order-item-name .dot { width: 6px; height: 6px; }
    .order-item-qty { width: 80px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 13px; text-align: center; outline: none; }
    .order-item-qty:focus { border-color: var(--accent); }
    .mbox label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
    .mbox textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; color: var(--text); font-size: 13px; margin-bottom: 14px; outline: none; font-family: inherit; resize: vertical; }
    .macts { display: flex; gap: 8px; margin-top: 4px; }
    .bcancel { flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--muted); border-radius: 7px; padding: 10px; cursor: pointer; font-size: 13px; }
    .bok { flex: 1; background: var(--accent); border: none; color: #fff; border-radius: 7px; padding: 10px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .bok:hover { opacity: .9; } .bok:disabled { opacity: .4; cursor: default; }
    .download-btn { display: inline-block; background: var(--green); color: #fff; border: none; border-radius: 7px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; margin: 4px; text-align: center; text-decoration: none; }
    .download-btn:hover { background: #16a34a; }
    
    #toast { position: fixed; bottom: 20px; right: 20px; z-index: 9999; background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: 11px 16px; font-size: 13px; transform: translateY(70px); opacity: 0; transition: all .25s; pointer-events: none; }
    #toast.on { transform: translateY(0); opacity: 1; }
    #toast.ok { border-color: var(--green); color: var(--green); }
    #toast.er { border-color: var(--red); color: var(--red); }
    .loader { text-align: center; padding: 60px; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .spin { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: sp .7s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px; color: var(--muted); }
    .empty .ei { font-size: 40px; margin-bottom: 12px; }
    .download-section { text-align: center; padding: 12px; background: #14532d; border-radius: 8px; margin-top: 12px; }
    
    @media(max-width:768px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .pg { padding: 12px; } td,th { padding: 7px 9px; font-size: 12px; }
      .nav { padding: 0 12px; } .topbar { padding: 0 12px; }
      .order-item-row { flex-wrap: wrap; } .order-item-qty { width: 100%; }
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="logo">🔐</div>
    <h1>PM Inventory System</h1>
    <p class="subtitle">Secure Login Required</p>
    <div id="login-error" class="login-error"></div>
    <label>👤 User ID</label>
    <input type="text" id="login-userid" placeholder="Enter your User ID..." autocomplete="off">
    <label>🔒 Password</label>
    <div class="password-field">
      <input type="password" id="login-password" placeholder="Enter your Password...">
      <button class="toggle-password" onclick="togglePassword()" title="Show/Hide Password">👁</button>
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">🔓 Login to Dashboard</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="brand">● <em>PM</em> Inventory System</div>
    <div class="tr">
      <button class="bsm" onclick="refreshAll()">↻ Refresh</button>
      <div class="uchip"><span id="dname"></span><span class="rbadge" id="dbadge"></span></div>
      <button class="bsm logout-btn" onclick="doLogout()">🚪 Logout</button>
    </div>
  </div>
  <div class="nav">
    <div class="tab on" data-t="ov" onclick="showTab('ov')">Overview</div>
    <div class="tab" data-t="pm" onclick="showTab('pm')" id="t-pm">PM Dashboard</div>
    <div class="tab" data-t="pnd" onclick="showTab('pnd')" id="t-pnd">Pending Orders</div>
    <div class="tab" data-t="pk" onclick="showTab('pk')">Ready to Pack</div>
    <div class="tab" data-t="log" onclick="showTab('log')" id="t-log">Orders Log</div>
  </div>
  <div class="pg" id="mc">
    <div class="loader"><div class="spin"></div><span>Loading data...</span></div>
  </div>
</div>

<div class="mbk" id="modal">
  <div class="mbox">
    <h2>🛒 Place Order</h2>
    <div class="msub" id="m-prod"></div>
    <label style="margin-bottom:12px;">📦 Enter Quantity for Each Missing Item</label>
    <div id="m-items-container"></div>
    <label style="margin-top:8px;">📝 Remarks (optional)</label>
    <textarea id="m-rmk" rows="2" placeholder="Any special instructions or notes..."></textarea>
    <div class="macts">
      <button class="bcancel" onclick="closeMod()">Cancel</button>
      <button class="bok" id="btn-place-order" onclick="doOrder()">✅ Place Orders & Download</button>
    </div>
    <div id="m-download-section"></div>
  </div>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════
// CONFIG
// ═══════════════════════════════════
var FIXED_API_URL = 'https://script.google.com/macros/s/AKfycbyC5U-eMZWubzmCkhOYz89wAIBKNx6a88vxrIOcKRSzZ_5a-pQjGtCIthc2rPN0eysR/exec';
var PM_ITEMS = ['Carton','Base Foil','Foil','Shipper','Leaflet','Jar'];
var SK = 'pm_v16_final';
var SESSION_KEY = 'pm_session_v4';

var USER_DATABASE = {
  'admin':      { password: 'admin123',    name: 'Administrator',       role: 'admin' },
  'pmstore':    { password: 'pmstore123',  name: 'PM Store Team',       role: 'pm_store' },
  'supervisor': { password: 'super123',    name: 'Packing Supervisor',  role: 'packing_supervisor' },
  'pmstore2':   { password: 'pmstore456',  name: 'PM Store Team 2',     role: 'pm_store' },
  'manager':    { password: 'manager123',  name: 'Plant Manager',       role: 'admin' }
};

var API = FIXED_API_URL, USER = '', USER_ID = '', ROLE = '';
var planning = [], pmData = {}, orders = [], staffList = [];
var curTab = 'ov', mId = null, mMiss = [], mRowData = null;
var activeSource = 'All', orderedBatchIds = {};

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
window.onload = function() {
  var session = getSession();
  if (session && session.userId && session.role) {
    USER_ID = session.userId; USER = session.userName; ROLE = session.role;
    if (session.orderedBatchIds) orderedBatchIds = session.orderedBatchIds;
    openApp(); return;
  }
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').addEventListener('keypress', function(e) { if (e.key === 'Enter') doLogin(); });
  document.getElementById('login-userid').addEventListener('keypress', function(e) { if (e.key === 'Enter') document.getElementById('login-password').focus(); });
};

function getSession() { try { return JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null'); } catch(e) { return null; } }
function setSession(d) { try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(d)); } catch(e) {} }
function clearSession() { try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {} }

// ═══════════════════════════════════
// LOGIN
// ═══════════════════════════════════
function doLogin() {
  var uid = document.getElementById('login-userid').value.trim().toLowerCase();
  var pwd = document.getElementById('login-password').value.trim();
  if (!uid) { showLoginError('Please enter your User ID'); return; }
  if (!pwd) { showLoginError('Please enter your Password'); return; }
  var u = USER_DATABASE[uid];
  if (!u) { showLoginError('❌ Invalid User ID'); return; }
  if (u.password !== pwd) { showLoginError('❌ Incorrect Password'); return; }
  document.getElementById('login-btn').textContent = '✅ Login Successful...';
  document.getElementById('login-btn').disabled = true;
  hideLoginError();
  USER_ID = uid; USER = u.name; ROLE = u.role;
  setSession({ userId: USER_ID, userName: USER, role: ROLE, loginTime: new Date().toISOString(), orderedBatchIds: orderedBatchIds });
  setTimeout(function() { openApp(); }, 500);
}

function showLoginError(m) { var e = document.getElementById('login-error'); e.textContent = m; e.style.display = 'block'; }
function hideLoginError() { document.getElementById('login-error').style.display = 'none'; }

function togglePassword() {
  var p = document.getElementById('login-password'), b = document.querySelector('.toggle-password');
  if (p.type === 'password') { p.type = 'text'; b.textContent = '🙈'; }
  else { p.type = 'password'; b.textContent = '👁'; }
}

function doLogout() {
  if (confirm('Are you sure you want to logout?')) {
    clearSession(); USER = ''; USER_ID = ''; ROLE = '';
    planning = []; pmData = {}; orders = [];
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-userid').value = '';
    document.getElementById('login-password').value = '';
    document.getElementById('login-btn').textContent = '🔓 Login to Dashboard';
    document.getElementById('login-btn').disabled = false;
    hideLoginError();
  }
}

function openApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('dname').textContent = USER;
  var b = document.getElementById('dbadge');
  if (ROLE === 'pm_store') { b.textContent = 'PM Store'; b.className = 'rbadge pm'; }
  else if (ROLE === 'packing_supervisor') { b.textContent = 'Supervisor'; b.className = 'rbadge su'; }
  else { b.textContent = 'Admin'; b.className = 'rbadge ad'; }
  if (ROLE === 'packing_supervisor') {
    document.getElementById('t-pm').classList.add('hide');
    document.getElementById('t-pnd').classList.add('hide');
    document.getElementById('t-log').classList.add('hide');
  } else {
    document.getElementById('t-pm').classList.remove('hide');
    document.getElementById('t-pnd').classList.remove('hide');
    document.getElementById('t-log').classList.remove('hide');
  }
  refreshAllData();
}

// ═══════════════════════════════════
// STORAGE
// ═══════════════════════════════════
function loadFromStorage() { try { return JSON.parse(localStorage.getItem(SK) || 'null'); } catch(e) { return null; } }
function saveToStorage(d) { try { localStorage.setItem(SK, JSON.stringify(d)); } catch(e) {} }
function persistOrderedBatches() {
  var s = loadFromStorage() || {}; s.orderedBatchIds = orderedBatchIds; saveToStorage(s);
  var ses = getSession() || {}; ses.orderedBatchIds = orderedBatchIds; setSession(ses);
}

// ═══════════════════════════════════
// API
// ═══════════════════════════════════
function callApi(action, body) {
  var url = API + '?action=' + encodeURIComponent(action);
  if (body) url += '&body=' + encodeURIComponent(JSON.stringify(body));
  return fetch(url).then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
}

function refreshAll() { refreshAllData(); }

function refreshAllData() {
  if (!USER || !ROLE) { doLogout(); return; }
  document.getElementById('mc').innerHTML = '<div class="loader"><div class="spin"></div><span>Loading data...</span></div>';
  Promise.all([callApi('getAllPlanning'), callApi('getPMData'), callApi('getOrders'), callApi('getStaffNames')])
  .then(function(res) {
    if (res[0].success) planning = (res[0].data || []).filter(function(r) { return !r._error; });
    if (res[1].success) pmData = res[1].data || {};
    if (res[2].success) orders = res[2].data || [];
    if (res[3].success) staffList = res[3].data || [];
    orders.forEach(function(o) { if (o['Batch No']) orderedBatchIds[o['Batch No']] = true; });
    persistOrderedBatches();
    renderCurrentTab();
    if (res[0].errors && res[0].errors.length) {
      var eb = document.createElement('div'); eb.className = 'err-banner';
      eb.innerHTML = '<b>⚠ Some sheets not connected:</b><br>' + res[0].errors.join('<br>');
      document.getElementById('mc').insertBefore(eb, document.getElementById('mc').firstChild);
    }
    showToast(planning.length + ' batches loaded', 'ok');
  })
  .catch(function(e) {
    document.getElementById('mc').innerHTML = '<div class="empty"><div class="ei">⚠</div><p style="color:var(--red)">' + e.message + '</p></div>';
    showToast('Connection error', 'er');
  });
}

// ═══════════════════════════════════
// ENRICH
// ═══════════════════════════════════
function enrich() {
  return planning.map(function(r) {
    var pm = pmData[r.id] || {};
    var sts = PM_ITEMS.map(function(i) { return pm[i + '_status'] || ''; });
    var f = sts.filter(function(s) { return s !== ''; }).length;
    var ov = 'INCOMPLETE';
    if (f === PM_ITEMS.length) {
      var aa = sts.every(function(s) { return s === 'Available'; });
      var nr = sts.some(function(s) { return s === 'Not Required'; });
      if (aa && !nr) ov = 'READY FOR PACKING';
      else if (nr) { var rem = sts.filter(function(s) { return s !== 'Not Required'; }); ov = rem.every(function(s) { return s === 'Available'; }) ? 'READY FOR PACKING' : 'PENDING'; }
      else ov = 'PENDING';
    }
    return Object.assign({}, r, { pm: pm, overall: ov, updBy: pm.updated_by || '', updAt: pm.last_updated || '' });
  });
}

// ═══════════════════════════════════
// TABS
// ═══════════════════════════════════
function showTab(t) {
  curTab = t;
  document.querySelectorAll('.tab').forEach(function(tab) { tab.classList.remove('on'); });
  var el = document.querySelector('[data-t="' + t + '"]'); if (el) el.classList.add('on');
  renderCurrentTab();
}

function renderCurrentTab() {
  if (curTab === 'ov') renderOverview();
  else if (curTab === 'pm') renderPM();
  else if (curTab === 'pnd') renderPending();
  else if (curTab === 'pk') renderReady();
  else if (curTab === 'log') renderLog();
}

function sortAndFilter(rows) {
  var s = rows.slice().sort(function(a, b) { return new Date(b.timestamp) - new Date(a.timestamp); });
  if (activeSource !== 'All') s = s.filter(function(r) { return r.source === activeSource; });
  return s;
}

function filterBar() {
  var all = enrich(), cnt = { All: all.length, Tablet: 0, Capsule: 0, Oncology: 0 };
  all.forEach(function(r) { if (cnt[r.source] !== undefined) cnt[r.source]++; });
  return '<div class="filter-bar">' + ['All','Tablet','Capsule','Oncology'].map(function(s) {
    var cls = s === 'All' ? 'all' : s === 'Tablet' ? 'tab' : s === 'Capsule' ? 'cap' : 'onc';
    return '<button class="filter-btn ' + cls + (activeSource === s ? ' active' : '') + '" onclick="setFilter(\'' + s + '\')">' + s + '<span class="filter-count">' + cnt[s] + '</span></button>';
  }).join('') + '</div>';
}

function setFilter(s) { activeSource = s; renderCurrentTab(); }

// ═══════════════════════════════════
// OVERVIEW
// ═══════════════════════════════════
function renderOverview() {
  var all = enrich(), rows = sortAndFilter(all);
  var t = all.length, rdy = all.filter(function(r) { return r.overall === 'READY FOR PACKING'; }).length;
  var pnd = all.filter(function(r) { return r.overall === 'PENDING'; }).length;
  var inc = all.filter(function(r) { return r.overall === 'INCOMPLETE'; }).length;
  var h = '<div class="stats">' +
    sc('b','📈',t,'Total') + sc('g','✓',rdy,'Ready','color:var(--green)') +
    sc('r','⚠',pnd,'Pending','color:var(--red)') + sc('a','◯',inc,'Incomplete','color:var(--amber)') +
    '</div>' + filterBar() +
    '<div class="tbox"><div class="th2"><div class="tt">All Batches (' + rows.length + ')</div><input class="ts2" placeholder="Search..." oninput="filt(this,\'t-ov\')"></div>' +
    '<div class="tsc"><table id="t-ov"><thead><tr>' +
    '<th>Source</th><th>Batch No</th><th>Timestamp</th><th>Batch Name</th><th>Child Batch</th><th>Child Batch Size</th><th>Pack Size</th><th>MRP</th><th>Status</th><th>Updated By</th>' +
    '</tr></thead><tbody>' +
    rows.map(function(r) { return '<tr><td>' + sp(r.source) + '</td><td style="font-family:monospace;font-size:12px">' + esc(r.batchNo) + '</td><td style="font-size:12px;color:var(--muted)">' + esc(r.timestamp) + '</td><td style="font-weight:600">' + esc(r.batchName) + '</td><td>' + esc(r.childBatches||'—') + '</td><td>' + esc(r.childBatchSize||'—') + '</td><td>' + esc(r.packSize||'—') + '</td><td>' + esc(r.mrp||'—') + '</td><td>' + stpill(r.overall) + '</td><td style="font-size:12px;color:var(--muted)">' + esc(r.updBy||'—') + '</td></tr>'; }).join('') +
    '</tbody></table>' + (rows.length === 0 ? '<div class="empty"><p>No data</p></div>' : '') + '</div></div>';
  document.getElementById('mc').innerHTML = h;
}

function sc(ic, sym, val, lbl, vs) { return '<div class="sc"><div class="sico ' + ic + '">' + sym + '</div><div><div class="sv"' + (vs ? ' style="' + vs + '"' : '') + '>' + val + '</div><div class="sl">' + lbl + '</div></div></div>'; }

// ═══════════════════════════════════
// PM DASHBOARD
// ═══════════════════════════════════
function renderPM() {
  var rows = sortAndFilter(enrich());
  var h = filterBar() + '<div class="tbox"><div class="th2"><div class="tt">PM Availability (' + rows.length + ')</div><input class="ts2" placeholder="Search..." oninput="filt(this,\'t-pm2\')"></div>' +
    '<div class="tsc"><table id="t-pm2"><thead><tr><th>Source</th><th>Batch No</th><th>Batch Name</th><th>Child Batch Size</th><th>Pack Size</th>' +
    PM_ITEMS.map(function(i) { return '<th>' + i + '</th>'; }).join('') + '<th>Overall</th><th>Save</th></tr></thead><tbody>';
  rows.forEach(function(r) {
    h += '<tr><td>' + sp(r.source) + '</td><td style="font-family:monospace;font-size:12px">' + esc(r.batchNo) + '</td><td style="font-weight:600">' + esc(r.batchName) + '</td><td>' + esc(r.childBatchSize||'—') + '</td><td>' + esc(r.packSize||'—') + '</td>';
    PM_ITEMS.forEach(function(item) {
      var st = r.pm[item + '_status'] || '', qt = r.pm[item + '_qty'] || '';
      var sc2 = st === 'Available' ? 'av' : st === 'Not Available' ? 'na' : st === 'Not Required' ? 'nr' : '';
      h += '<td><div class="pm-cell"><div class="pm-lbl">' + item + '</div><select class="ps ' + sc2 + '" data-rid="' + r.id + '" data-itm="' + item + '" onchange="chgS(this)"><option value="" ' + (st === '' ? 'selected' : '') + '>—</option><option value="Available" ' + (st === 'Available' ? 'selected' : '') + '>✓ Available</option><option value="Not Available" ' + (st === 'Not Available' ? 'selected' : '') + '>✗ Not Available</option><option value="Not Required" ' + (st === 'Not Required' ? 'selected' : '') + '>⊘ Not Required</option></select><input class="pq" type="number" min="0" placeholder="Qty" data-rid="' + r.id + '" data-itm="' + item + '" value="' + esc(qt) + '" style="display:' + (st ? 'block' : 'none') + '"></div></td>';
    });
    h += '<td>' + stpill(r.overall) + '</td><td><button class="bsave" id="sv-' + r.id + '" onclick="savePM(\'' + r.id + '\',\'' + ej(r.source) + '\',\'' + ej(r.batchNo) + '\',\'' + ej(r.batchName) + '\',\'' + ej(r.timestamp) + '\')">Save</button></td></tr>';
  });
  h += '</tbody></table>' + (rows.length === 0 ? '<div class="empty"><p>No data</p></div>' : '') + '</div></div>';
  document.getElementById('mc').innerHTML = h;
}

function chgS(sel) {
  var v = sel.value; sel.className = 'ps' + (v === 'Available' ? ' av' : v === 'Not Available' ? ' na' : v === 'Not Required' ? ' nr' : '');
  var q = document.querySelector('input.pq[data-rid="' + sel.dataset.rid + '"][data-itm="' + sel.dataset.itm + '"]');
  if (q) q.style.display = v ? 'block' : 'none';
}

function savePM(id, src, bn, bname, ts) {
  var btn = document.getElementById('sv-' + id); if (!btn) return;
  btn.textContent = '...'; btn.disabled = true;
  var pms = {};
  PM_ITEMS.forEach(function(i) {
    var s = document.querySelector('select.ps[data-rid="' + id + '"][data-itm="' + i + '"]');
    var q = document.querySelector('input.pq[data-rid="' + id + '"][data-itm="' + i + '"]');
    pms[i] = { status: s ? s.value : '', qty: q ? q.value : '' };
  });
  callApi('updatePMStatus', { id: id, source: src, batchNo: bn, batchName: bname, timestampPlanning: ts, pmStatuses: pms, updatedBy: USER })
  .then(function(res) {
    if (res.success) {
      pmData[id] = pmData[id] || {};
      PM_ITEMS.forEach(function(i) { pmData[id][i + '_status'] = pms[i].status; pmData[id][i + '_qty'] = pms[i].qty; });
      pmData[id].overall_status = res.overall; pmData[id].updated_by = USER; pmData[id].last_updated = res.lastUpdated;
      showToast('Saved!', 'ok'); renderPM();
    } else { showToast('Failed', 'er'); btn.textContent = 'Save'; btn.disabled = false; }
  })
  .catch(function(e) { showToast('Error: ' + e.message, 'er'); btn.textContent = 'Save'; btn.disabled = false; });
}

// ═══════════════════════════════════
// PENDING
// ═══════════════════════════════════
function renderPending() {
  var rows = sortAndFilter(enrich().filter(function(r) { return r.overall === 'PENDING'; }));
  var h = filterBar() + '<div class="tbox"><div class="th2"><div class="tt">Pending Orders</div><input class="ts2" placeholder="Search..." oninput="filt(this,\'t-pnd2\')"></div>' +
    '<div class="tsc"><table id="t-pnd2"><thead><tr><th>Source</th><th>Batch No</th><th>Batch Name</th><th>Child Batch Size</th><th>Pack Size</th><th>Missing</th><th>Updated By</th><th>Action</th></tr></thead><tbody>';
  rows.forEach(function(r) {
    var miss = PM_ITEMS.filter(function(i) { return (r.pm[i + '_status'] || '') === 'Not Available'; });
    var ordered = orderedBatchIds[r.batchNo];
    var act = ordered ? '<div class="action-cell"><button class="complete-btn">✅ Done</button><button class="modify-btn" onclick="openMod(\'' + r.id + '\',\'' + ej(r.source) + '\',\'' + ej(r.batchNo) + '\',\'' + ej(r.batchName) + '\',\'' + miss.join(',') + '\')">✎ Modify</button></div>' : '<button class="border-btn" onclick="openMod(\'' + r.id + '\',\'' + ej(r.source) + '\',\'' + ej(r.batchNo) + '\',\'' + ej(r.batchName) + '\',\'' + miss.join(',') + '\')">🛒 Order</button>';
    h += '<tr><td>' + sp(r.source) + '</td><td style="font-family:monospace;font-size:12px">' + esc(r.batchNo) + '</td><td style="font-weight:600">' + esc(r.batchName) + '</td><td>' + esc(r.childBatchSize||'—') + '</td><td>' + esc(r.packSize||'—') + '</td><td>' + miss.map(function(m) { return '<span class="pill pr2" style="margin:2px">' + m + '</span>'; }).join('') + '</td><td style="font-size:12px;color:var(--muted)">' + esc(r.updBy||'—') + '</td><td>' + act + '</td></tr>';
  });
  h += '</tbody></table>' + (rows.length === 0 ? '<div class="empty"><div class="ei">✓</div><p>No pending</p></div>' : '') + '</div></div>';
  document.getElementById('mc').innerHTML = h;
}

// ═══════════════════════════════════
// READY
// ═══════════════════════════════════
function renderReady() {
  var rows = sortAndFilter(enrich().filter(function(r) { return r.overall === 'READY FOR PACKING'; }));
  var h = filterBar() + '<div class="tbox"><div class="th2"><div class="tt">Ready to Pack</div><input class="ts2" placeholder="Search..." oninput="filt(this,\'t-pk2\')"></div>' +
    '<div class="tsc"><table id="t-pk2"><thead><tr><th>Source</th><th>Batch No</th><th>Batch Name</th><th>Colour</th><th>Master Batch Size</th><th>Child Batch Size</th><th>Pack Size</th><th>Foil Size</th><th>MRP</th><th>PM</th><th>By</th></tr></thead><tbody>';
  rows.forEach(function(r) {
    h += '<tr><td>' + sp(r.source) + '</td><td style="font-family:monospace;font-size:12px">' + esc(r.batchNo) + '</td><td style="font-weight:600">' + esc(r.batchName) + '</td><td>' + esc(r.colour||'—') + '</td><td>' + esc(r.masterBatchSize||'—') + '</td><td>' + esc(r.childBatchSize||'—') + '</td><td>' + esc(r.packSize||'—') + '</td><td>' + esc(r.foilSize||'—') + '</td><td>' + esc(r.mrp||'—') + '</td><td>' + PM_ITEMS.map(function(i) { return '<span class="pill pg2" style="margin:1px;font-size:9px">' + i + '</span>'; }).join('') + '</td><td style="font-size:12px;color:var(--muted)">' + esc(r.updBy||'—') + '</td></tr>';
  });
  h += '</tbody></table>' + (rows.length === 0 ? '<div class="empty"><div class="ei">◯</div><p>No ready</p></div>' : '') + '</div></div>';
  document.getElementById('mc').innerHTML = h;
}

// ═══════════════════════════════════
// LOG
// ═══════════════════════════════════
function renderLog() {
  var h = '<div class="tbox"><div class="th2"><div class="tt">Orders Log</div><input class="ts2" placeholder="Search..." oninput="filt(this,\'t-log2\')"></div>' +
    '<div class="tsc"><table id="t-log2"><thead><tr><th>Order ID</th><th>Batch No</th><th>Batch Name</th><th>Item</th><th>Qty</th><th>By</th><th>Time</th><th>Status</th></tr></thead><tbody>';
  orders.slice().reverse().forEach(function(o) {
    var sc2 = o['Order Status'] === 'Received' ? 'pg2' : o['Order Status'] === 'Ordered' ? 'pb2' : 'pz2';
    h += '<tr><td style="font-family:monospace;font-size:10px;color:var(--muted)">' + esc(o['Order ID']||'—') + '</td><td style="font-size:12px">' + esc(o['Batch No']||'—') + '</td><td style="font-weight:600">' + esc(o['Batch Name']||'—') + '</td><td><span class="pill pr2" style="font-size:9px">' + esc(o['Missing Items']||'—') + '</span></td><td>' + esc(o['Order Qty']||'—') + '</td><td>' + esc(o['Ordered By']||'—') + '</td><td style="font-size:11px;color:var(--muted)">' + esc(o['Timestamp']||'—') + '</td><td><span class="pill ' + sc2 + '">' + esc(o['Order Status']||'—') + '</span></td></tr>';
  });
  h += '</tbody></table>' + (orders.length === 0 ? '<div class="empty"><p>No orders</p></div>' : '') + '</div></div>';
  document.getElementById('mc').innerHTML = h;
}

// ═══════════════════════════════════
// ORDER MODAL
// ═══════════════════════════════════
function openMod(id, src, bn, bname, missStr) {
  mId = id; mMiss = missStr.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
  mRowData = planning.find(function(r) { return r.id === id; });
  document.getElementById('m-prod').textContent = '📋 ' + bname + ' | Batch: ' + bn + ' | Source: ' + src;
  var ih = '';
  mMiss.forEach(function(item, idx) {
    ih += '<div class="order-item-row"><div class="order-item-name"><span class="dot dr"></span> ' + item + '</div><input type="number" class="order-item-qty" id="m-qty-' + idx + '" placeholder="Qty" min="1"><span style="font-size:10px;color:var(--muted)">pcs</span></div>';
  });
  document.getElementById('m-items-container').innerHTML = ih;
  document.getElementById('m-rmk').value = '';
  document.getElementById('m-download-section').innerHTML = '';
  document.getElementById('btn-place-order').disabled = false;
  document.getElementById('btn-place-order').textContent = '✅ Place Orders & Download';
  document.getElementById('modal').classList.add('on');
}

function closeMod() { document.getElementById('modal').classList.remove('on'); mId = null; mRowData = null; }

function doOrder() {
  var items = [], valid = true;
  mMiss.forEach(function(item, idx) {
    var qinp = document.getElementById('m-qty-' + idx);
    var q = qinp ? parseInt(qinp.value) : 0;
    if (!q || q < 1) { if (qinp) qinp.style.borderColor = 'var(--red)'; valid = false; }
    else { if (qinp) qinp.style.borderColor = 'var(--border)'; items.push({ item: item, qty: q }); }
  });
  if (!valid) { showToast('Enter valid qty for ALL items', 'er'); return; }
  if (!mId || !mRowData) return;
  var btn = document.getElementById('btn-place-order');
  btn.textContent = '⏳ Processing...'; btn.disabled = true;
  var rmk = document.getElementById('m-rmk').value.trim();
  
  callApi('placeMultiOrder', {
    source: mRowData.source, batchNo: mRowData.batchNo, batchName: mRowData.batchName,
    childBatchSize: mRowData.childBatchSize || '', packSize: mRowData.packSize || '',
    items: items, orderedBy: USER, remarks: rmk, exportExcel: true
  })
  .then(function(res) {
    if (res.success) {
      showToast('✅ ' + items.length + ' orders placed!', 'ok');
      orderedBatchIds[mRowData.batchNo] = true; persistOrderedBatches();
      if (res.orders) res.orders.forEach(function(o) { orders.push(o); });
      
      var dh = '<div class="download-section">';
      if (res.excelBase64) {
        dh += '<button class="download-btn" onclick="downloadExcel(\'' + res.excelBase64 + '\', \'Order_' + (mRowData.batchNo || 'export') + '.xls\')">📥 Download Excel</button> ';
      }
      dh += '<p style="font-size:10px;color:var(--muted);margin-top:6px;">IDs: ' + (res.orderIds || []).join(', ') + '</p></div>';
      document.getElementById('m-download-section').innerHTML = dh;
      btn.textContent = '✅ Done!';
      
      // Auto-download
      if (res.excelBase64) {
        setTimeout(function() { downloadExcel(res.excelBase64, 'Order_' + (mRowData.batchNo || 'export') + '.xls'); }, 800);
      }
      setTimeout(function() { closeMod(); renderPending(); }, 3000);
    } else {
      showToast('Failed: ' + (res.error || 'Error'), 'er');
      btn.textContent = '✅ Place Orders & Download'; btn.disabled = false;
    }
  })
  .catch(function(e) { showToast('Error: ' + e.message, 'er'); btn.textContent = '✅ Place Orders & Download'; btn.disabled = false; });
}

// ⭐ DOWNLOAD EXCEL AS .XLS
function downloadExcel(b64, fname) {
  try {
    var bytes = atob(b64), arr = new Uint8Array(bytes.length);
    for (var i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    var blob = new Blob([arr], { type: 'application/vnd.ms-excel' });
    var url = window.URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = fname.replace('.xlsx', '.xls');
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    window.URL.revokeObjectURL(url);
    showToast('📥 Downloaded!', 'ok');
  } catch(e) { showToast('Download error', 'er'); }
}

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeMod(); });

// ═══════════════════════════════════
// HELPERS
// ═══════════════════════════════════
function filt(inp, tid) { var q = inp.value.toLowerCase(); document.querySelectorAll('#' + tid + ' tbody tr').forEach(function(tr) { tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none'; }); }
function sp(s) { var l = s === 'Tablet' ? 'Tablet' : s === 'Capsule' ? 'Capsule' : 'Oncology'; var c = s === 'Tablet' ? 'pb2' : s === 'Capsule' ? 'pg2' : 'pa2'; return '<span class="pill ' + c + '">' + l + '</span>'; }
function stpill(s) { if (s === 'READY FOR PACKING') return '<span class="pill pg2"><span class="dot dg"></span>Ready</span>'; if (s === 'PENDING') return '<span class="pill pr2"><span class="dot dr"></span>Pending</span>'; return '<span class="pill pz2">Incomplete</span>'; }
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function ej(s) { return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
function showToast(m, t) { var e = document.getElementById('toast'); e.textContent = m; e.className = 'on ' + (t || ''); setTimeout(function() { e.className = ''; }, 3500); }
</script>
