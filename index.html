<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>PM Inventory | Not Required</title>
  <style>
    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #22263a;
      --card: #1e2235;
      --border: #2e334d;
      --text: #e8eaf6;
      --muted: #8b91b5;
      --accent: #4f78ff;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --blue: #38bdf8;
      --purple: #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    #setup {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sbox {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      width: 540px;
      max-width: 96vw;
    }
    .sbox h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: 12px; margin-bottom: 24px; line-height: 1.7; }
    .lbl { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 5px; display: block; }
    .lbl span { color: var(--red); }
    input.fi, select.fi {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 13px;
      margin-bottom: 16px;
      outline: none;
    }
    input.fi:focus, select.fi:focus { border-color: var(--accent); }
    .btn-go {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .btn-go:hover { opacity: 0.9; }
    #err-msg { color: var(--red); font-size: 12px; margin-bottom: 12px; display: none; padding: 8px 12px; background: #450a0a; border-radius: 6px; }
    #ok-msg { color: var(--green); font-size: 12px; margin-bottom: 12px; display: none; padding: 8px 12px; background: #14532d; border-radius: 6px; }
    #app { display: none; }
    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .brand { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .brand em { color: var(--accent); font-style: normal; }
    .tr { display: flex; align-items: center; gap: 10px; }
    .uchip {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .rbadge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .rbadge.pm { background: #1e3a5f; color: var(--blue); }
    .rbadge.su { background: #14532d; color: var(--green); }
    .rbadge.ad { background: #3b1f6a; color: var(--purple); }
    .bsm {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 7px;
      padding: 5px 11px;
      cursor: pointer;
      font-size: 12px;
    }
    .bsm:hover { border-color: var(--accent); color: var(--text); }
    .nav {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      padding: 0 20px;
      gap: 2px;
      overflow-x: auto;
    }
    .tab {
      padding: 11px 16px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.on { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .tab.hide { display: none; }
    .pg { padding: 20px; max-width: 1500px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 20px; }
    .sc {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .sico {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .sico.b { background: #1e3a5f; } .sico.g { background: #14532d; } .sico.r { background: #450a0a; } .sico.a { background: #422006; } .sico.p { background: #3b1f6a; }
    .sv { font-size: 28px; font-weight: 700; line-height: 1; }
    .sl { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .tbox { background: var(--card); border: 1px solid var(--border); border-radius: 11px; overflow: hidden; }
    .th2 {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 8px;
    }
    .tt { font-size: 14px; font-weight: 600; }
    .ts2 {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 12px;
      color: var(--text);
      font-size: 12px;
      width: 210px;
      outline: none;
    }
    .ts2:focus { border-color: var(--accent); }
    .tsc { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--bg3);
      text-align: left;
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td { padding: 11px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(79,120,255,.04); }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .pg2 { color: #4ade80; background: #14532d; }
    .pr2 { color: #f87171; background: #450a0a; }
    .pa2 { color: #fbbf24; background: #422006; }
    .pb2 { color: #60a5fa; background: #1e3a5f; }
    .pz2 { color: var(--muted); background: var(--bg3); border: 1px solid var(--border); }
    .pnr { color: #c084fc; background: #3b1f6a; } /* Not Required pill */
    .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .dg { background: #4ade80; } .dr { background: #f87171; } .da { background: #fbbf24; } .dp { background: #c084fc; }
    select.ps {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 6px;
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
      outline: none;
      width: 100%;
      min-width: 130px;
    }
    select.ps.av { border-color: var(--green); color: var(--green); }
    select.ps.na { border-color: var(--red); color: var(--red); }
    select.ps.nr { border-color: #c084fc; color: #c084fc; }
    input.pq {
      width: 58px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 6px;
      color: var(--text);
      font-size: 11px;
      text-align: center;
      outline: none;
    }
    .pm-cell { display: flex; flex-direction: column; gap: 4px; min-width: 130px; }
    .pm-lbl { font-size: 9px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
    .bsave {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 11px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }
    .bsave:hover { opacity: .85; }
    .bsave:disabled { opacity: .4; cursor: default; }
    .border-btn { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; border-radius: 6px; padding: 5px 11px; font-size: 11px; cursor: pointer; font-weight: 600; }
    .border-btn:hover { background: #7f1d1d; color: #fff; }
    .err-banner { background: #450a0a; border: 1px solid #7f1d1d; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 12px; color: #f87171; line-height: 1.6; }
    .filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { color: #fff; border-color: transparent; }
    .filter-btn.all.active { background: var(--accent); }
    .filter-btn.tab.active { background: #1e3a5f; color: var(--blue); border-color: var(--blue); }
    .filter-btn.cap.active { background: #14532d; color: var(--green); border-color: var(--green); }
    .filter-btn.onc.active { background: #422006; color: var(--amber); border-color: var(--amber); }
    .filter-count { font-size: 10px; background: rgba(255,255,255,.1); padding: 1px 6px; border-radius: 10px; margin-left: 4px; }
    .mbk { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 999; align-items: center; justify-content: center; }
    .mbk.on { display: flex; }
    .mbox { background: var(--card); border: 1px solid var(--border); border-radius: 14px; width: 460px; max-width: 96vw; padding: 28px; }
    .mbox h2 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .msub { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
    .mbox label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
    .mbox input, .mbox textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; color: var(--text); font-size: 13px; margin-bottom: 14px; outline: none; font-family: inherit; }
    .mbox input:focus, .mbox textarea:focus { border-color: var(--accent); }
    .macts { display: flex; gap: 8px; margin-top: 4px; }
    .bcancel { flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--muted); border-radius: 7px; padding: 10px; cursor: pointer; font-size: 13px; }
    .bok { flex: 1; background: var(--accent); border: none; color: #fff; border-radius: 7px; padding: 10px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .bok:hover { opacity: .9; }
    .mtags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
    .mtag { background: #450a0a; color: #f87171; border-radius: 5px; padding: 3px 9px; font-size: 11px; }
    #toast { position: fixed; bottom: 20px; right: 20px; z-index: 9999; background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: 11px 16px; font-size: 13px; transform: translateY(70px); opacity: 0; transition: all .25s; pointer-events: none; }
    #toast.on { transform: translateY(0); opacity: 1; }
    #toast.ok { border-color: var(--green); color: var(--green); }
    #toast.er { border-color: var(--red); color: var(--red); }
    .loader { text-align: center; padding: 60px; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .spin { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: sp .7s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px; color: var(--muted); }
    .empty .ei { font-size: 40px; margin-bottom: 12px; }
    @media(max-width:768px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .pg { padding: 12px; } td,th { padding: 7px 9px; font-size: 12px; }
      .nav { padding: 0 12px; } .topbar { padding: 0 12px; }
    }
  </style>
</head>
<body>
<div id="setup">
  <div class="sbox">
    <h1>● PM Inventory System</h1>
    <p class="sub">Select your name and role to open the dashboard.</p>
    <div id="err-msg"></div>
    <div id="ok-msg"></div>
    <label class="lbl">Your Name <span>*</span></label>
    <select class="fi" id="inp-name"><option value="">-- Select your name --</option></select>
    <label class="lbl">Your Role <span>*</span></label>
    <select class="fi" id="inp-role">
      <option value="pm_store">PM Store Team</option>
      <option value="packing_supervisor">Packing Supervisor</option>
      <option value="admin">Admin / Manager</option>
    </select>
    <button class="btn-go" onclick="goDash()">Open Dashboard →</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="brand">● <em>PM</em> Inventory System</div>
    <div class="tr">
      <button class="bsm" onclick="refreshAll()">↻ Refresh</button>
      <div class="uchip"><span id="dname"></span><span class="rbadge" id="dbadge"></span></div>
      <button class="bsm" onclick="switchU()">↩ Switch User</button>
    </div>
  </div>
  <div class="nav">
    <div class="tab on" data-t="ov" onclick="showTab('ov')">Overview</div>
    <div class="tab" data-t="pm" onclick="showTab('pm')" id="t-pm">PM Dashboard</div>
    <div class="tab" data-t="pnd" onclick="showTab('pnd')" id="t-pnd">Pending Orders</div>
    <div class="tab" data-t="pk" onclick="showTab('pk')">Ready to Pack</div>
    <div class="tab" data-t="log" onclick="showTab('log')" id="t-log">Orders Log</div>
  </div>
  <div class="pg" id="mc">
    <div class="loader"><div class="spin"></div><span>Loading data...</span></div>
  </div>
</div>

<div class="mbk" id="modal">
  <div class="mbox">
    <h2>Place Order</h2>
    <div class="msub" id="m-prod"></div>
    <label>Missing PM Items</label>
    <div class="mtags" id="m-tags"></div>
    <label>Order Quantity <span style="color:var(--red)">*</span></label>
    <input type="number" id="m-qty" placeholder="Enter quantity..." min="1">
    <label>Remarks (optional)</label>
    <textarea id="m-rmk" rows="2" placeholder="Any notes..."></textarea>
    <div class="macts">
      <button class="bcancel" onclick="closeMod()">Cancel</button>
      <button class="bok" onclick="doOrder()">Place Order</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
  var FIXED_API_URL = 'https://script.google.com/macros/s/AKfycbyEmPfavlX7sRos20ddm8525irwcZ2j4EmRlB2Ap1MghjmSzDHIAzwimfuELBoSiyq8oA/exec';
  var PM_ITEMS = ['Carton','Base Foil','Foil','Shipper','Leaflet','Jar'];
  var SK = 'pm_inv_v6_nr';
  var API=FIXED_API_URL, USER='', ROLE='';
  var planning=[], pmData={}, orders=[], staffList=[];
  var curTab='ov', mId=null, mMiss=[];
  var activeSource = 'All';

  window.onload = function() {
    API = FIXED_API_URL;
    var s = load();
    if (s && s.role) document.getElementById('inp-role').value = s.role;
    fetchStaff(FIXED_API_URL, s?s.name:'');
  };

  function load(){ try{ return JSON.parse(localStorage.getItem(SK)||'null'); }catch(e){ return null; } }
  function save(o){ try{ localStorage.setItem(SK,JSON.stringify(o)); }catch(e){} }

  function api(action, body) {
    var url = API + '?action=' + encodeURIComponent(action);
    if (body) url += '&body=' + encodeURIComponent(JSON.stringify(body));
    return fetch(url).then(function(r){
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  function fetchStaff(url, sel) {
    fetch(url + '?action=getStaffNames')
    .then(r=>r.json())
    .then(d=>{
      var s = document.getElementById('inp-name');
      s.innerHTML = '<option value="">-- Select your name --</option>';
      var names = (d.success && d.data && d.data.length) ? d.data : ['Manager','PM Store','Supervisor'];
      names.forEach(n=>{ let o=document.createElement('option'); o.value=n; o.textContent=n; if(n===sel) o.selected=true; s.appendChild(o); });
    }).catch(()=>{});
  }

  function goDash() {
    var name = document.getElementById('inp-name').value.trim();
    var role = document.getElementById('inp-role').value;
    API = FIXED_API_URL;
    if (!name) { document.getElementById('err-msg').style.display='block'; document.getElementById('err-msg').textContent='Please select your name'; return; }
    USER = name; ROLE = role;
    save({ name:name, role:role });
    document.getElementById('setup').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('dname').textContent=name;
    var b=document.getElementById('dbadge');
    if(role==='pm_store'){ b.textContent='PM Store'; b.className='rbadge pm'; }
    else if(role==='packing_supervisor'){ b.textContent='Supervisor'; b.className='rbadge su'; }
    else { b.textContent='Admin'; b.className='rbadge ad'; }
    if(role==='packing_supervisor'){
      document.getElementById('t-pm').classList.add('hide');
      document.getElementById('t-pnd').classList.add('hide');
      document.getElementById('t-log').classList.add('hide');
    }
    refreshAll();
  }

  function switchU() {
    document.getElementById('app').style.display='none';
    document.getElementById('setup').style.display='flex';
    var s=load(); if(s&&s.role) document.getElementById('inp-role').value=s.role;
    fetchStaff(FIXED_API_URL, s?s.name:'');
  }

  function refreshAll() {
    document.getElementById('mc').innerHTML='<div class="loader"><div class="spin"></div><span>Loading data...</span></div>';
    Promise.all([api('getAllPlanning'), api('getPMData'), api('getOrders'), api('getStaffNames')])
    .then(res=>{
      if(res[0].success) planning=(res[0].data||[]).filter(r=>!r._error);
      if(res[1].success) pmData=res[1].data||{};
      if(res[2].success) orders=res[2].data||[];
      if(res[3].success) staffList=res[3].data||[];
      renderTab();
      if(res[0].errors&&res[0].errors.length){
        let eb=document.createElement('div'); eb.className='err-banner';
        eb.innerHTML='<b>⚠ Some sheets not connected:</b><br>'+res[0].errors.join('<br>');
        document.getElementById('mc').insertBefore(eb, document.getElementById('mc').firstChild);
      }
      toast(planning.length+' batches loaded','ok');
    }).catch(e=>{
      document.getElementById('mc').innerHTML='<div class="empty"><div class="ei">⚠</div><p style="color:var(--red)">'+e.message+'</p></div>';
      toast('Connection error','er');
    });
  }

  function enrich() {
    return planning.map(r=>{
      var pm = pmData[r.id] || {};
      var sts = PM_ITEMS.map(i=>pm[i+'_status']||'');
      var filled = sts.filter(s=>s!=='').length;
      var ov = 'INCOMPLETE';
      if(filled === PM_ITEMS.length) {
        let allAvailable = sts.every(s=>s==='Available');
        let anyNotRequired = sts.some(s=>s==='Not Required');
        if(allAvailable && !anyNotRequired) ov = 'READY FOR PACKING';
        else if(anyNotRequired) {
          let remaining = sts.filter(s=>s!=='Not Required');
          ov = remaining.every(s=>s==='Available') ? 'READY FOR PACKING' : 'PENDING';
        } else {
          ov = 'PENDING';
        }
      }
      return Object.assign({}, r, { pm:pm, overall:ov, updBy:pm.updated_by||'', updAt:pm.last_updated||'' });
    });
  }

  function showTab(t) {
    curTab=t;
    document.querySelectorAll('.tab').forEach(e=>e.classList.remove('on'));
    let el=document.querySelector('[data-t="'+t+'"]'); if(el) el.classList.add('on');
    renderTab();
  }

  function renderTab() {
    if(curTab==='ov') renderOv();
    else if(curTab==='pm') renderPM();
    else if(curTab==='pnd') renderPnd();
    else if(curTab==='pk') renderPk();
    else if(curTab==='log') renderLog();
  }

  function sortedFiltered(rows) {
    let sorted = rows.slice().sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
    if(activeSource!=='All') sorted = sorted.filter(r=>r.source===activeSource);
    return sorted;
  }

  function filterBar() {
    let all=enrich();
    let counts={All:all.length,Tablet:0,Capsule:0,Oncology:0};
    all.forEach(r=>{if(counts[r.source]!==undefined) counts[r.source]++;});
    return '<div class="filter-bar">'+['All','Tablet','Capsule','Oncology'].map(s=>{
      let cls=s==='All'?'all':s==='Tablet'?'tab':s==='Capsule'?'cap':'onc';
      return `<button class="filter-btn ${cls} ${activeSource===s?'active':''}" onclick="setFilter('${s}')">${s}<span class="filter-count">${counts[s]}</span></button>`;
    }).join('')+'</div>';
  }

  function setFilter(src){ activeSource=src; renderTab(); }

  function renderOv(){
    let all=enrich();
    let total=all.length, ready=all.filter(r=>r.overall==='READY FOR PACKING').length;
    let pend=all.filter(r=>r.overall==='PENDING').length, inc=all.filter(r=>r.overall==='INCOMPLETE').length;
    let rows=sortedFiltered(all);
    let h=`<div class="stats">
      ${sc('b','📈',total,'Total Batches')} ${sc('g','✓',ready,'Ready for Packing','color:var(--green)')}
      ${sc('r','⚠',pend,'PM Materials Missing','color:var(--red)')} ${sc('a','◯',inc,'Not Updated Yet','color:var(--amber)')}
    </div>${filterBar()}
    <div class="tbox"><div class="th2"><div class="tt">All Batches (${rows.length})</div><input class="ts2" placeholder="Search..." oninput="filt(this,'t-ov')"></div>
    <div class="tsc"><table id="t-ov"><thead><tr><th>Source</th><th>Batch No</th><th>Timestamp</th><th>Batch Name</th><th>Child Batch</th><th>Pack Size</th><th>MRP</th><th>PM Status</th><th>Updated By</th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td>${sp(r.source)}</td><td style="font-family:monospace">${esc(r.batchNo)}</td><td style="font-size:12px;color:var(--muted)">${esc(r.timestamp)}</td><td style="font-weight:600">${esc(r.batchName)}</td><td>${esc(r.childBatches||'—')}</td><td>${esc(r.packSize||'—')}</td><td>${esc(r.mrp||'—')}</td><td>${stpill(r.overall)}</td><td style="font-size:12px;color:var(--muted)">${esc(r.updBy||'—')}</td></tr>`).join('')}
    </tbody></table>${rows.length===0?'<div class="empty"><p>No data found.</p></div>':''}</div></div>`;
    document.getElementById('mc').innerHTML=h;
  }

  function sc(ic,sym,val,lbl,vs=''){ return `<div class="sc"><div class="sico ${ic}">${sym}</div><div><div class="sv"${vs?' style="'+vs+'"':''}>${val}</div><div class="sl">${lbl}</div></div></div>`; }

  function renderPM(){
    let rows=sortedFiltered(enrich());
    let h=filterBar()+`<div class="tbox"><div class="th2"><div class="tt">PM Availability (${rows.length})</div><input class="ts2" placeholder="Search..." oninput="filt(this,'t-pm2')"></div>
    <div class="tsc"><table id="t-pm2"><thead><tr><th>Source</th><th>Batch No</th><th>Batch Name</th><th>Pack Size</th>${PM_ITEMS.map(i=>'<th>'+i+'</th>').join('')}<th>Overall</th><th>Save</th></tr></thead><tbody>`;
    rows.forEach(r=>{
      h+=`<tr><td>${sp(r.source)}</td><td style="font-family:monospace">${esc(r.batchNo)}</td><td style="font-weight:600">${esc(r.batchName)}</td><td>${esc(r.packSize||'—')}</td>`;
      PM_ITEMS.forEach(item=>{
        let st=r.pm[item+'_status']||'', qt=r.pm[item+'_qty']||'';
        let sc2=st==='Available'?'av':st==='Not Available'?'na':st==='Not Required'?'nr':'';
        h+=`<td><div class="pm-cell"><div class="pm-lbl">${item}</div>
          <select class="ps ${sc2}" data-rid="${r.id}" data-itm="${item}" onchange="chgS(this)">
            <option value="" ${st==''?'selected':''}>— Select —</option>
            <option value="Available" ${st==='Available'?'selected':''}>✓ Available</option>
            <option value="Not Available" ${st==='Not Available'?'selected':''}>✗ Not Available</option>
            <option value="Not Required" ${st==='Not Required'?'selected':''}>⊘ Not Required</option>
          </select>
          <input class="pq" type="number" min="0" placeholder="Qty" data-rid="${r.id}" data-itm="${item}" value="${esc(qt)}" style="display:${st?'block':'none'}">
        </div></td>`;
      });
      h+=`<td>${stpill(r.overall)}</td><td><button class="bsave" id="sv-${r.id}" onclick="saveR('${r.id}','${ej(r.source)}','${ej(r.batchNo)}','${ej(r.batchName)}','${ej(r.timestamp)}')">Save</button></td></tr>`;
    });
    h+=`</tbody></table>${rows.length===0?'<div class="empty"><p>No planning data.</p></div>':''}</div></div>`;
    document.getElementById('mc').innerHTML=h;
  }

  function chgS(sel){
    let v=sel.value;
    sel.className='ps'+(v==='Available'?' av':v==='Not Available'?' na':v==='Not Required'?' nr':'');
    let q=document.querySelector(`input.pq[data-rid="${sel.dataset.rid}"][data-itm="${sel.dataset.itm}"]`);
    if(q) q.style.display=v?'block':'none';
  }

  function saveR(id, source, batchNo, batchName, ts){
    let btn=document.getElementById('sv-'+id); if(!btn) return;
    btn.textContent='Saving...'; btn.disabled=true;
    let pms={};
    PM_ITEMS.forEach(item=>{
      let s=document.querySelector(`select.ps[data-rid="${id}"][data-itm="${item}"]`);
      let q=document.querySelector(`input.pq[data-rid="${id}"][data-itm="${item}"]`);
      pms[item]={status:s?s.value:'', qty:q?q.value:''};
    });
    api('updatePMStatus',{id,source,batchNo,batchName,timestampPlanning:ts,pmStatuses:pms,updatedBy:USER})
    .then(res=>{
      if(res.success){
        pmData[id]=pmData[id]||{};
        PM_ITEMS.forEach(item=>{ pmData[id][item+'_status']=pms[item].status; pmData[id][item+'_qty']=pms[item].qty; });
        pmData[id].overall_status=res.overall; pmData[id].updated_by=USER; pmData[id].last_updated=res.lastUpdated;
        toast('Saved! Status: '+res.overall,'ok'); renderPM();
      } else { toast('Save failed: '+(res.error||'unknown'),'er'); btn.textContent='Save'; btn.disabled=false; }
    }).catch(e=>{ toast('Error: '+e.message,'er'); btn.textContent='Save'; btn.disabled=false; });
  }

  function renderPnd(){
    let rows=sortedFiltered(enrich().filter(r=>r.overall==='PENDING'));
    let h=filterBar()+`<div class="tbox"><div class="th2"><div class="tt">Pending Orders</div><input class="ts2" placeholder="Search..." oninput="filt(this,'t-pnd2')"></div>
    <div class="tsc"><table id="t-pnd2"><thead><tr><th>Source</th><th>Batch No</th><th>Batch Name</th><th>Pack Size</th><th>Missing Items</th><th>Updated By</th><th>Action</th></tr></thead><tbody>
    ${rows.map(r=>{
      let miss=PM_ITEMS.filter(i=>(r.pm[i+'_status']||'')==='Not Available');
      return `<tr><td>${sp(r.source)}</td><td style="font-family:monospace">${esc(r.batchNo)}</td><td style="font-weight:600">${esc(r.batchName)}</td><td>${esc(r.packSize||'—')}</td>
      <td>${miss.map(m=>`<span class="pill pr2" style="margin:2px">${m}</span>`).join('')}</td><td style="font-size:12px;color:var(--muted)">${esc(r.updBy||'—')}</td>
      <td><button class="border-btn" onclick="openMod('${r.id}','${ej(r.source)}','${ej(r.batchNo)}','${ej(r.batchName)}','${miss.join(',')}')">Place Order</button></td></tr>`;
    }).join('')}
    </tbody></table>${rows.length===0?'<div class="empty"><div class="ei">✓</div><p>No pending items.</p></div>':''}</div></div>`;
    document.getElementById('mc').innerHTML=h;
  }

  function renderPk(){
    let rows=sortedFiltered(enrich().filter(r=>r.overall==='READY FOR PACKING'));
    let h=filterBar()+`<div class="tbox"><div class="th2"><div class="tt">Ready to Pack</div><input class="ts2" placeholder="Search..." oninput="filt(this,'t-pk2')"></div>
    <div class="tsc"><table id="t-pk2"><thead><tr><th>Source</th><th>Batch No</th><th>Batch Name</th><th>Colour</th><th>Master Batch Size</th><th>Pack Size</th><th>Foil Size</th><th>MRP</th><th>PM Status</th><th>Cleared By</th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td>${sp(r.source)}</td><td style="font-family:monospace">${esc(r.batchNo)}</td><td style="font-weight:600">${esc(r.batchName)}</td><td>${esc(r.colour||'—')}</td><td>${esc(r.masterBatchSize||'—')}</td><td>${esc(r.packSize||'—')}</td><td>${esc(r.foilSize||'—')}</td><td>${esc(r.mrp||'—')}</td><td>${PM_ITEMS.map(i=>'<span class="pill pg2" style="margin:1px;font-size:9px">'+i+'</span>').join('')}</td><td style="font-size:12px;color:var(--muted)">${esc(r.updBy||'—')}</td></tr>`).join('')}
    </tbody></table>${rows.length===0?'<div class="empty"><div class="ei">◯</div><p>No batches ready.</p></div>':''}</div></div>`;
    document.getElementById('mc').innerHTML=h;
  }

  function renderLog(){
    let h=`<div class="tbox"><div class="th2"><div class="tt">Orders Log</div><input class="ts2" placeholder="Search..." oninput="filt(this,'t-log2')"></div>
    <div class="tsc"><table id="t-log2"><thead><tr><th>Order ID</th><th>Batch No</th><th>Batch Name</th><th>Missing Items</th><th>Qty</th><th>Ordered By</th><th>Timestamp</th><th>Status</th></tr></thead><tbody>
    ${orders.slice().reverse().map(o=>{
      let miss=(o['Missing Items']||'').split(',').map(m=>`<span class="pill pr2" style="margin:1px;font-size:9px">${m.trim()}</span>`).join('');
      let sc2=o['Order Status']==='Received'?'pg2':o['Order Status']==='Ordered'?'pb2':'pz2';
      return `<tr><td style="font-family:monospace;font-size:10px;color:var(--muted)">${esc(o['Order ID']||'—')}</td><td style="font-size:12px">${esc(o['Batch No']||'—')}</td><td style="font-weight:600">${esc(o['Batch Name']||'—')}</td><td>${miss}</td><td>${esc(o['Order Qty']||'—')}</td><td>${esc(o['Ordered By']||'—')}</td><td style="font-size:11px;color:var(--muted)">${esc(o['Timestamp']||'—')}</td><td><span class="pill ${sc2}">${esc(o['Order Status']||'—')}</span></td></tr>`;
    }).join('')}
    </tbody></table>${orders.length===0?'<div class="empty"><p>No orders yet.</p></div>':''}</div></div>`;
    document.getElementById('mc').innerHTML=h;
  }

  function openMod(id, source, batchNo, batchName, missStr){
    mId=id; mMiss=missStr.split(',').map(s=>s.trim()).filter(Boolean);
    document.getElementById('m-prod').textContent=batchName+' ('+batchNo+') — '+source;
    document.getElementById('m-tags').innerHTML=mMiss.map(m=>`<span class="mtag">${m}</span>`).join('');
    document.getElementById('m-qty').value=''; document.getElementById('m-rmk').value='';
    document.getElementById('modal').classList.add('on');
  }
  function closeMod(){ document.getElementById('modal').classList.remove('on'); mId=null; }
  function doOrder(){
    let qty=document.getElementById('m-qty').value.trim(), rmk=document.getElementById('m-rmk').value.trim();
    if(!qty||parseInt(qty)<1){ toast('Enter valid quantity','er'); return; }
    if(!mId) return;
    let row=planning.find(r=>r.id===mId); if(!row) return;
    api('placeOrder',{source:row.source,batchNo:row.batchNo,batchName:row.batchName,missingItems:mMiss.join(', '),orderQty:qty,orderedBy:USER,remarks:rmk})
    .then(res=>{
      if(res.success){
        toast('Order placed! ID: '+res.orderId,'ok');
        orders.push({'Order ID':res.orderId,'Source':row.source,'Batch No':row.batchNo,'Batch Name':row.batchName,'Missing Items':mMiss.join(', '),'Order Qty':qty,'Ordered By':USER,'Timestamp':res.timestamp,'Order Status':'Ordered','Remarks':rmk});
        closeMod();
      } else toast('Order failed','er');
    }).catch(e=>toast('Error: '+e.message,'er'));
  }
  document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeMod();});

  function filt(inp,tid){
    let q=inp.value.toLowerCase();
    document.querySelectorAll('#'+tid+' tbody tr').forEach(tr=>tr.style.display=tr.textContent.toLowerCase().includes(q)?'':'none');
  }
  function sp(s){
    let l=s==='Tablet'?'Tablet':s==='Capsule'?'Capsule':'Oncology';
    let c=s==='Tablet'?'pb2':s==='Capsule'?'pg2':'pa2';
    return `<span class="pill ${c}">${l}</span>`;
  }
  function stpill(s){
    if(s==='READY FOR PACKING') return '<span class="pill pg2"><span class="dot dg"></span>Ready</span>';
    if(s==='PENDING') return '<span class="pill pr2"><span class="dot dr"></span>Pending</span>';
    return '<span class="pill pz2">Incomplete</span>';
  }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function ej(s){ return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
  function toast(msg,type){
    let e=document.getElementById('toast'); e.textContent=msg; e.className='on '+(type||'');
    setTimeout(()=>{ e.className=''; },3500);
  }
</script>
</body>
</html>
